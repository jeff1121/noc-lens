name: code-review

# 對 PR 與 main 推送執行程式碼審查（格式、Clippy、前端建置），
# 修正可自動修正者，並產生繁體中文摘要報告。
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Rust（含 rustfmt、clippy）
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 安裝 Linux 系統相依套件
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libdbus-1-dev \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 安裝 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: 格式檢查（rustfmt）
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: 靜態分析（clippy）
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: 後端測試
        id: test
        continue-on-error: true
        run: cargo test -p noc-lens-backend

      - name: 安裝前端依賴
        run: npm ci
        working-directory: frontend

      - name: 前端型別檢查
        id: fe_type
        continue-on-error: true
        run: npm run type-check
        working-directory: frontend

      - name: 前端 lint
        id: fe_lint
        continue-on-error: true
        run: npm run lint
        working-directory: frontend

      - name: 前端建置
        id: fe_build
        continue-on-error: true
        run: npm run build
        working-directory: frontend

      - name: 安裝 E2E 依賴
        run: npm ci
        working-directory: e2e

      - name: 安裝 Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: E2E 測試
        id: e2e
        continue-on-error: true
        run: npm run test:ci
        working-directory: e2e

      - name: 產生繁體中文審查報告
        if: always()
        run: |
          {
            echo "## 程式碼審查報告（noc-lens）"
            echo ""
            echo "| 檢查項目 | 結果 |"
            echo "|----------|------|"
            echo "| 格式（rustfmt） | ${{ steps.fmt.outcome == 'success' && '✅ 通過' || '⚠ 需修正' }} |"
            echo "| 靜態分析（clippy） | ${{ steps.clippy.outcome == 'success' && '✅ 通過' || '⚠ 有警告' }} |"
            echo "| 後端測試 | ${{ steps.test.outcome == 'success' && '✅ 通過' || '❌ 失敗' }} |"
            echo "| 前端型別檢查 | ${{ steps.fe_type.outcome == 'success' && '✅ 通過' || '❌ 失敗' }} |"
            echo "| 前端 lint | ${{ steps.fe_lint.outcome == 'success' && '✅ 通過' || '❌ 失敗' }} |"
            echo "| 前端建置 | ${{ steps.fe_build.outcome == 'success' && '✅ 通過' || '❌ 失敗' }} |"
            echo "| E2E 測試 | ${{ steps.e2e.outcome == 'success' && '✅ 通過' || '❌ 失敗' }} |"
            echo ""
            echo "> 建議：對「需修正」項目於本機執行 \`cargo fmt --all\` 與 \`cargo clippy --fix\` 後再提交。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 檢查失敗時中止工作
        if: always() && (steps.fmt.outcome != 'success' || steps.clippy.outcome != 'success' || steps.test.outcome != 'success' || steps.fe_type.outcome != 'success' || steps.fe_lint.outcome != 'success' || steps.fe_build.outcome != 'success' || steps.e2e.outcome != 'success')
        run: exit 1
